name = "oxide-chat-backend"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-03"

[build]
command = "cargo install -q worker-build && worker-build --release"

[[durable_objects.bindings]]
name = "CHATROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]
